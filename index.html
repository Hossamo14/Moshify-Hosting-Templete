<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap"

  <body>
    <section class="block block--dark block--skewed-right hero">
      <!-- notice that we start with general classes then a specified ones here we used hero class to override clipping in block--skewed-right -->

        <header class="block__header hero__content">
          <h1 class=" block__heading">Cloud Hosting for Pros</h1>
          <p class="hero__tagline">Deploy Your Website in less than 60 seconds</p>
          <a href="" class="btn btn--accent btn--streatched">Get Started</a>
        </header>
        <img class="hero__image" src="images/banner.png" alt="">
      </div>
    </section>

    <script src="js/main.js"></script>
